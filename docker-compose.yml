version: '3.8'

services:
  db:
    image: postgres:15
    container_name: gramflow-postgres
    environment:
      POSTGRES_USER: gramflow_user
      POSTGRES_PASSWORD: gramflow_password
      POSTGRES_DB: gramflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: gramflow-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
